<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirm Your Email - MendAI</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #f3f4f6; margin: 0; }
        .card { background: white; padding: 40px 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); width: 100%; max-width: 360px; text-align: center; }
        
        .icon-container { width: 64px; height: 64px; background-color: #e0f2fe; border: 1px solid #bae6fd; border-radius: 50%; display: flex; justify-content: center; align-items: center; margin: 0 auto 20px auto; color: #0284c7; font-size: 28px; }
        
        h2 { color: #1f2937; margin-bottom: 10px; font-size: 24px; margin-top: 0; }
        p { color: #6b7280; font-size: 15px; margin-bottom: 25px; line-height: 1.5; }
        
        button.submit { width: 100%; padding: 12px; background-color: #3ecf8e; color: white; border: none; border-radius: 6px; font-size: 16px; font-weight: 600; cursor: pointer; transition: background 0.2s; }
        button.submit:hover { background-color: #2e9d6b; }
        button.submit:disabled { background-color: #9ca3af; cursor: not-allowed; }
        
        .message { margin-top: 15px; font-size: 14px; display: none; padding: 10px; border-radius: 6px; text-align: left; }
        .success { color: #15803d; background-color: #f0fdf4; border: 1px solid #bbf7d0; }
        .error { color: #b91c1c; background-color: #fef2f2; border: 1px solid #fecaca; }
    </style>
</head>
<body>

<div class="card" id="confirm-card">
    <div class="icon-container" id="card-icon">✉️</div>
    <h2 id="card-title">Almost there!</h2>
    <p id="card-text">Click the button below to verify your email and activate your account access.</p>
    
    <button id="confirm-btn" class="submit" onclick="confirmEmailAndSave()">Confirm Email</button>
    
    <div id="msg" class="message"></div>
</div>

<script>
    // 1. CONNECT TO YOUR SUPABASE
    const SUPABASE_URL = "https://cvsvgufcupscsyalgnvl.supabase.co"; 
    const SUPABASE_ANON_KEY = "sb_publishable_rW_g0Diq0QXbMcbeahxS6g_3R-_PEEB";
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // 2. ACTION ON BUTTON CLICK
    async function confirmEmailAndSave() {
        const confirmBtn = document.getElementById('confirm-btn');
        const cardIcon = document.getElementById('card-icon');
        const cardTitle = document.getElementById('card-title');
        const cardText = document.getElementById('card-text');

        confirmBtn.innerText = "Processing...";
        confirmBtn.disabled = true;

        try {
            // Check if the user has an active authenticated session from the email link
            const { data: sessionData, error: sessionError } = await supabaseClient.auth.getSession();
            
            if (sessionError) throw sessionError;
            
            if (!sessionData.session) {
                throw new Error("No active session found. Please click the original link sent to your email again.");
            }

            // Get the verified user details
            const user = sessionData.session.user;

            /* 3. ADD DATA TO YOUR DATABASE TABLE
               This inserts or updates the user record into your custom 'profiles' or 'users' table 
               to mark them permanently active in your database.
            */
            const { error: dbError } = await supabaseClient
                .from('profiles') // Replace 'profiles' with your actual table name
                .upsert({ 
                    id: user.id, 
                    email: user.email, 
                    email_verified: true,
                    updated_at: new Date()
                });

            if (dbError) throw dbError;

            // 4. SUCCESS UI TRANSFORMATION
            cardIcon.innerText = "✅";
            cardIcon.style.backgroundColor = "#f0fdf4";
            cardIcon.style.borderColor = "#bbf7d0";
            cardIcon.style.color = "#3ecf8e";
            
            cardTitle.innerText = "Verified!";
            cardText.innerText = "Your email verification has been confirmed, and your profile is active.";
            
            confirmBtn.innerText = "Confirmed ✅";
            showMsg("Database updated successfully! You can now use the mobile app.", "success");

        } catch (error) {
            showMsg(error.message || "An error occurred during verification.", "error");
            confirmBtn.innerText = "Confirm Email";
            confirmBtn.disabled = false;
        }
    }

    // 5. SHOW MESSAGE FUNCTION
    function showMsg(text, type) {
        const msgDiv = document.getElementById('msg');
        msgDiv.innerText = text;
        msgDiv.className = `message ${type}`;
        msgDiv.style.display = 'block';
    }
</script>

</body>
</html>
